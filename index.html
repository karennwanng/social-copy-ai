<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de legenda com IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Gerador de legenda com IA</h1>
        <p>Descreva sua ideia que a IA vai ajudar a gerar legendas e posts para suas redes sociais</p>

        <textarea id="descricao" placeholder="Ex: Faça um legenda sobre o café ..."></textarea>
        <section>
            
                <label for="redes-sociais">Redes Sociais</label>
                <select id="redes-sociais">
                    <option value="facebook">Facebook</option>
                    <option value="instagram">Instagram</option>
                    <option value="twitter/X">Twitter/X</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="tiktok">TikTok</option>
                </select>
            
        </section>

        <section>
            <label for="tons">Tom da conversa</label>
            <select id="tons">
                <option value="informal">Informal</option>
                <option value="profissional">Profissional</option>
                <option value="provocativo">Provocativo</option>
                <option value="inspirador">Inspirador</option>
                <option value="humorístico">Humoristico</option>
                <option value="rapido-direto">Rápido e direto</option>
            </select>
        </section>
        
        <div id="botoes">
            <button id="btn-gerar" onclick="gerarLegenda()">Gerar</button>
            <button id="btn-limpar" onclick="limpar()">Limpar</button>
        </div>

        <div id="resultado">
            <p id="texto-gerado"></p>
        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
